version: "2.1"
services:
  # https://hub.docker.com/r/linuxserver/firefox
  firefox:
    image: lscr.io/linuxserver/firefox
    container_name: firefox
    restart: unless-stopped
    ports:
      - 3000:3000
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Oslo
    volumes:
      - ${POOL}/services/firefox:/config
    shm_size: "1gb"