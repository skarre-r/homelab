version: "3.7"

networks:
  vpn:
    name: vpn
    external: false
  proxy:
    external: true

services:
  # https://hub.docker.com/r/linuxserver/wireguard
  wireguard:
    image: lscr.io/linuxserver/wireguard
    container_name: wireguard
    restart: unless-stopped
    networks:
     - proxy
     - vpn
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    ports:
      - 51820:51820/udp     # wireguard
      - 9696:9696           # prowlarr
      - 7878:7878           # radarr
      - 8989:8989           # sonarr
      - 6767:6767           # bazarr
      - 9091:9091           # transmission
      - 51413:51413/udp     # transmission
      - 8080:8080           # sabnzbd
      - 9090:9090           # sabnzbd
      # - 8686:8686           # lidarr
      # - 8787:8787           # readarr
    expose:
      - "51820/udp"
    environment:
      - PUID=1337
      - PGID=1337
      - TZ=Europe/Oslo
    volumes:
      - ${POOL}/services/wireguard:/config
      - /lib/modules:/lib/modules
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    labels:
      - "traefik.enable=true"
      # prowlarr
      - "traefik.http.routers.prowlarr.entrypoints=websecure"
      - "traefik.http.routers.prowlarr.rule=Host(`prowlarr.${DOMAIN}`)"
      - "traefik.http.routers.prowlarr.middlewares=auth-middleware"
      - "traefik.http.routers.prowlarr.service=prowlarr"
      - "traefik.http.services.prowlarr.loadbalancer.server.port=9696"
      # radarr
      - "traefik.http.routers.radarr.entrypoints=websecure"
      - "traefik.http.routers.radarr.rule=Host(`radarr.${DOMAIN}`)"
      - "traefik.http.routers.radarr.middlewares=auth-middleware"
      - "traefik.http.routers.radarr.service=radarr"
      - "traefik.http.services.radarr.loadbalancer.server.port=7878"
      # sonarr
      - "traefik.http.routers.sonarr.entrypoints=websecure"
      - "traefik.http.routers.sonarr.rule=Host(`sonarr.${DOMAIN}`)"
      - "traefik.http.routers.sonarr.middlewares=auth-middleware"
      - "traefik.http.routers.sonarr.service=sonarr"
      - "traefik.http.services.sonarr.loadbalancer.server.port=8989"
      # bazarr
      - "traefik.http.routers.bazarr.entrypoints=websecure"
      - "traefik.http.routers.bazarr.rule=Host(`bazarr.${DOMAIN}`)"
      - "traefik.http.routers.bazarr.middlewares=auth-middleware"
      - "traefik.http.routers.bazarr.service=bazarr"
      - "traefik.http.services.bazarr.loadbalancer.server.port=6767"
      # transmission
      - "traefik.http.routers.transmission.entrypoints=websecure"
      - "traefik.http.routers.transmission.rule=Host(`transmission.${DOMAIN}`)"
      - "traefik.http.routers.transmission.middlewares=auth-middleware"
      - "traefik.http.routers.transmission.service=transmission"
      - "traefik.http.services.transmission.loadbalancer.server.port=9091"
      # sabnzbd
      - "traefik.http.routers.sabnzbd.entrypoints=websecure"
      - "traefik.http.routers.sabnzbd.rule=Host(`sabnzbd.${DOMAIN}`)"
      - "traefik.http.routers.sabnzbd.middlewares=auth-middleware"
      - "traefik.http.routers.sabnzbd.service=sabnzbd"
      - "traefik.http.services.sabnzbd.loadbalancer.server.port=8080"
      # lidarr
      # - "traefik.http.routers.lidarr.entrypoints=websecure"
      # - "traefik.http.routers.lidarr.rule=Host(`lidarr.${DOMAIN}`)"
      # - "traefik.http.routers.lidarr.middlewares=auth-middleware"
      # - "traefik.http.routers.lidarr.service=lidarr"
      # - "traefik.http.services.lidarr.loadbalancer.server.port=8686"
      # readarr
      # - "traefik.http.routers.readarr.entrypoints=websecure"
      # - "traefik.http.routers.readarr.rule=Host(`readarr.${DOMAIN}`)"
      # - "traefik.http.routers.readarr.middlewares=auth-middleware"
      # - "traefik.http.routers.readarr.service=readarr"
      # - "traefik.http.services.readarr.loadbalancer.server.port=8787"

  # https://hub.docker.com/r/linuxserver/prowlarr
  # port: 9696
  prowlarr:
    image: ghcr.io/linuxserver/prowlarr:develop
    container_name: prowlarr
    restart: unless-stopped
    environment:
      - PUID=1337
      - PGID=1337
      - TZ=Europe/Oslo
    volumes:
      - ${POOL}/services/prowlarr:/config
    depends_on:
      - wireguard
    network_mode: service:wireguard

  # https://hub.docker.com/r/linuxserver/radarr
  # ports: 7878
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    environment:
      - PUID=1337
      - PGID=1337
      - TZ=Europe/Oslo
    volumes:
      - ${POOL}/services/radarr:/config
      - ${POOL}/media:/media
    depends_on:
      - wireguard
    network_mode: service:wireguard

  # https://hub.docker.com/r/linuxserver/sonarr
  # ports: 8989
  sonarr:
    image: lscr.io/linuxserver/sonarr
    container_name: sonarr
    restart: unless-stopped
    environment:
      - PUID=1337
      - PGID=1337
      - TZ=Europe/Oslo
    volumes:
      - ${POOL}/services/sonarr:/config
      - ${POOL}/media:/media
    depends_on:
      - wireguard
    network_mode: service:wireguard

  # https://hub.docker.com/r/linuxserver/bazarr
  # ports: 6767
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    restart: unless-stopped
    environment:
      - PUID=1337
      - PGID=1337
      - TZ=Europe/Oslo
    volumes:
      - ${POOL}/services/bazarr:/config
      - ${POOL}/media:/media
    depends_on:
      - wireguard
    network_mode: service:wireguard

  # https://hub.docker.com/r/linuxserver/transmission
  # ports: 9091, 51413/udp
  transmission:
    image: lscr.io/linuxserver/transmission
    container_name: transmission
    restart: unless-stopped
    environment:
      - PUID=1337
      - PGID=1337
      - TZ=Europe/Oslo
    volumes:
      - ${POOL}/services/transmission:/config
      - ${POOL}/media:/media
    depends_on:
      - wireguard
    network_mode: service:wireguard
  
  # https://hub.docker.com/r/linuxserver/sabnzbd
  # ports: 8080, 9090
  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    restart: unless-stopped
    environment:
      - PUID=1337
      - PGID=1337
      - TZ=Europe/Oslo
    volumes:
      - ${POOL}/services/sabnzbd:/config
      - ${POOL}/media:/media
    depends_on:
      - wireguard
    network_mode: service:wireguard

  # https://hub.docker.com/r/linuxserver/lidarr
  # ports: 8686
  # lidarr:
  #   image: lscr.io/linuxserver/lidarr:latest
  #   container_name: lidarr
  #   restart: unless-stopped
  #   environment:
  #     - PUID=1337
  #     - PGID=1337
  #     - TZ=Europe/Oslo
  #   volumes:
  #     - ${POOL}/services/lidarr:/config
  #     - ${POOL}/media:/media
  #   depends_on:
  #     - wireguard
  #   network_mode: service:wireguard

  # https://hub.docker.com/r/linuxserver/readarr
  # ports: 8787
  # readarr:
  #   image: ghcr.io/linuxserver/readarr:nightly
  #   container_name: readarr
  #   restart: unless-stopped
  #   environment:
  #     - PUID=1337
  #     - PGID=1337
  #     - TZ=Europe/Oslo
  #   volumes:
  #     - ${POOL}/services/readarr:/config
  #     - ${POOL}/media:/media
  #   depends_on:
  #     - wireguard
  #   network_mode: service:wireguard
