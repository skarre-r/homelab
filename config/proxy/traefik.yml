global:
  sendAnonymousUsage: false

entryPoints:
  http:
    address: ":80"
  https:
    address: ":443"

api:
  dashboard: true
  insecure: true

log:
  level: DEBUG
  filePath: "traefik.log"
  format: json

accessLog:
  filePath: "log-access.log"
  bufferingSize: 100
  format: json

providers:
  docker:
    network: proxy
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false

certificatesResolvers:
  http:
    acme:
      # email: your-email.com
      storage: acme.json
      httpChallenge:
        entryPoint: http