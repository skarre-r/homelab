version: "2.1"
services:
  # https://hub.docker.com/r/linuxserver/wireguard
  wireguard:
    image: lscr.io/linuxserver/wireguard
    container_name: wireguard
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    ports:
      - 51820:51820/udp     # wireguard
      - 9696:9696           # prowlarr
      - 7878:7878           # radarr
      - 8989:8989           # sonarr
      - 9091:9091           # transmission
      - 51413:51413         # transmission
      - 51413:51413/udp     # transmission
      - 8081:8080           # sabnzbd
      - 9090:9090           # sabnzbd
      - 6767:6767           # bazarr
      - 8686:8686           # lidarr
      - 8787:8787           # readarr
    expose:
      - "51820/udp"
    environment:
      - PUID=1337
      - PGID=1337
      - TZ=Europe/Oslo
    volumes:
      - ${POOL}/services/wireguard:/config
      - /lib/modules:/lib/modules
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1

  # https://hub.docker.com/r/linuxserver/prowlarr
  prowlarr:
    # expose:
    #   - "9696"
    image: ghcr.io/linuxserver/prowlarr:develop
    container_name: prowlarr
    restart: unless-stopped
    environment:
      - PUID=1337
      - PGID=1337
      - TZ=Europe/Oslo
    volumes:
      - ${POOL}/services/prowlarr:/config
    depends_on:
      - wireguard
    network_mode: service:wireguard

  # https://hub.docker.com/r/linuxserver/radarr
  radarr:
    # expose:
    #   - "7878"
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    environment:
      - PUID=1337
      - PGID=1337
      - TZ=Europe/Oslo
    volumes:
      - ${POOL}/services/radarr:/config
      - ${POOL}/media:/media
    depends_on:
      - wireguard
    network_mode: service:wireguard

  # https://hub.docker.com/r/linuxserver/sonarr
  sonarr:
    # expose:
    #   - "8989"
    image: lscr.io/linuxserver/sonarr
    container_name: sonarr
    restart: unless-stopped
    environment:
      - PUID=1337
      - PGID=1337
      - TZ=Europe/Oslo
    volumes:
      - ${POOL}/services/sonarr:/config
      - ${POOL}/media:/media
    depends_on:
      - wireguard
    network_mode: service:wireguard

  # https://hub.docker.com/r/linuxserver/bazarr
  bazarr:
    # expose:
    #   - "6767"
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    restart: unless-stopped
    environment:
      - PUID=1337
      - PGID=1337
      - TZ=Europe/Oslo
    volumes:
      - ${POOL}/services/bazarr:/config
      - ${POOL}/media:/media
    depends_on:
      - wireguard
    network_mode: service:wireguard

  # https://hub.docker.com/r/linuxserver/lidarr
  lidarr:
    # expose:
    #   - "8686"
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    restart: unless-stopped
    environment:
      - PUID=1337
      - PGID=1337
      - TZ=Europe/Oslo
    volumes:
      - ${POOL}/services/lidarr:/config
      - ${POOL}/media:/media
    depends_on:
      - wireguard
    network_mode: service:wireguard

  # https://hub.docker.com/r/linuxserver/readarr
  readarr:
    # expose:
    #   - "8787"
    image: ghcr.io/linuxserver/readarr:nightly
    container_name: readarr
    restart: unless-stopped
    environment:
      - PUID=1337
      - PGID=1337
      - TZ=Europe/Oslo
    volumes:
      - ${POOL}/services/readarr:/config
      - ${POOL}/media:/media
    depends_on:
      - wireguard
    network_mode: service:wireguard

  # https://hub.docker.com/r/linuxserver/transmission
  transmission:
    # expose:
    #   - "9091"
    #   - "51413/udp"
    image: lscr.io/linuxserver/transmission
    container_name: transmission
    restart: unless-stopped
    environment:
      - PUID=1337
