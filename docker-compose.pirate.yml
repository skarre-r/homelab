version: "2.1"
services:
  # https://hub.docker.com/r/linuxserver/wireguard
  wireguard:
    image: lscr.io/linuxserver/wireguard
    container_name: wireguard
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    ports:
      - 51820:51820/udp     # wireguard
      - 9696:9696           # prowlarr
      - 7878:7878           # radarr
      - 8989:8989           # sonarr
      - 9091:9091           # transmission
      - 51413:51413         # transmission
      - 51413:51413/udp     # transmission
      - 8080:8080           # sabnzbd
      - 9090:9090           # sabnzbd
    environment:
      - PUID=1337
      - PGID=1337
      - TZ=Europe/Oslo
    volumes:
      - ${POOL}/services/wireguard:/config
      - /lib/modules:/lib/modules
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1

  # https://hub.docker.com/r/linuxserver/prowlarr
  prowlarr:
    image: ghcr.io/linuxserver/prowlarr:develop
    container_name: prowlarr
    restart: unless-stopped
    # ports:
    #   - 9696:9696
    environment:
      - PUID=1337
      - PGID=1337
      - TZ=Europe/Oslo
    volumes:
      - ${POOL}/services/prowlarr:/config
    depends_on:
      - wireguard
    network_mode: service:wireguard

  # https://hub.docker.com/r/linuxserver/radarr
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    # ports:
    #   - 7878:7878
    environment:
      - PUID=1337
      - PGID=1337
      - TZ=Europe/Oslo
    volumes:
      - ${POOL}/services/radarr:/config
      - ${POOL}/media:/media
    depends_on:
      - wireguard
    network_mode: service:wireguard

  # https://hub.docker.com/r/linuxserver/sonarr
  sonarr:
    image: lscr.io/linuxserver/sonarr
    container_name: sonarr
    restart: unless-stopped
    # ports:
    #   - 8989:8989
    environment:
      - PUID=1337
      - PGID=1337
      - TZ=Europe/Oslo
    volumes:
      - ${POOL}/services/sonarr:/config
      - ${POOL}/media:/media
    depends_on:
      - wireguard
    network_mode: service:wireguard

  # https://hub.docker.com/r/linuxserver/transmission
  transmission:
    image: lscr.io/linuxserver/transmission
    container_name: transmission
    restart: unless-stopped
    ports:
      # - 9091:9091
      # - 51413:51413
      # - 51413:51413/udp
    environment:
      - PUID=1337
      - PGID=1337
      - TZ=Europe/Oslo
    volumes:
      - ${POOL}/services/transmission:/config
      - ${POOL}/media:/media
    depends_on:
      - wireguard
    network_mode: service:wireguard
  
  # https://hub.docker.com/r/linuxserver/sabnzbd
  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    restart: unless-stopped
    # ports:
    #   - 8080:8080  # avoid conflicts with other services running on port 8080?
    #   - 9090:9090
    environment:
      - PUID=1337
      - PGID=1337
      - TZ=Europe/Oslo
    volumes:
      - ${POOL}/services/sabnzbd:/config
      - ${POOL}/media:/media
    depends_on:
      - wireguard
    network_mode: service:wireguard
