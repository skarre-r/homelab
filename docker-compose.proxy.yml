version: "3.7"

networks:
  proxy:
    name: proxy
    external: false
  docker-proxy:
    external: true

services:
  # https://hub.docker.com/_/traefik
  traefik:
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped
    networks:
      - proxy
      - docker-proxy
    ports:
      - "80:80"
      - "443:443"
    expose:
      - "80"
      - "443"
      - "8080"
    volumes:
      - ./config/traefik/letsencrypt:/letsencrypt
      - ./config/traefik/dynamic:/dynamic
    environment:
      NJALLA_TOKEN: ${NJALLA_TOKEN}
      NJALLA_HTTP_TIMEOUT: 10
      NJALLA_POLLING_INTERVAL: 30
      NJALLA_PROPAGATION_TIMEOUT: 360
    command:
      # global
      - --global.checknewversion=true
      - --global.sendanonymoususage=false
      # api/ dashboard
      - --api.debug=false
      - --api.dashboard=true
      # logs
      - --log.level=INFO
      - --log.format=common
      # providers/ docker
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=proxy
      - --providers.docker.endpoint=tcp://docker-socket-proxy:2375  # default: unix:///var/run/docker.sock
      # providers/ file
      - --providers.file.directory=/dynamic
      - --providers.file.watch=true
      # entrypoints
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --entrypoints.websecure.http.tls.certresolver=letsencrypt
      - --entrypoints.websecure.http.tls.domains[0].main=${DOMAIN}
      - --entrypoints.websecure.http.tls.domains[0].sans=*.${DOMAIN}
      # letsencrypt
      - --certificatesresolvers.letsencrypt.acme.dnschallenge=true
      - --certificatesresolvers.letsencrypt.acme.dnschallenge.provider=njalla
      - --certificatesresolvers.letsencrypt.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`proxy.${DOMAIN}`) || Host(`traefik.${DOMAIN}`)"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.middlewares=auth-middleware"
      - "traefik.http.services.traefik.loadbalancer.server.port=8080"
      # middlewares
      - "traefik.http.middlewares.robots.headers.customrequestheaders.X-Robots-Tag=noindex, nofollow, nosnippet, noarchive, nocache, notranslate, noimageindex"
      - "traefik.http.middlewares.authelia.forwardauth.address=http://authelia:9091/api/verify?rd=https://login.${DOMAIN}"
      - "traefik.http.middlewares.authelia.forwardauth.trustForwardHeader=true"
      - "traefik.http.middlewares.authelia.forwardauth.authResponseHeaders=Remote-User,Remote-Groups,Remote-Name,Remote-Email"
      # middleware "chains"
      - "traefik.http.middlewares.no-auth-middleware.chain.middlewares=robots"
      - "traefik.http.middlewares.auth-middleware.chain.middlewares=authelia,robots"
      # flame
      - flame.type=app
      - flame.name=traefik
      - flame.url=https://traefik.${DOMAIN}
      - flame.icon=traffic-light
